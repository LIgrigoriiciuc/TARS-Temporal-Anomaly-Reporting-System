<!-- LOGIN PAGE -->

<main class="flex min-h-screen items-center justify-center p-4">
  <section class="w-full max-w-[400px] beveled-outset">

    <!-- Window title bar -->
    <header class="h-8 bg-sky-700 px-3 flex items-center justify-between border-b-2 border-sky-900">
      <span class="font-bold text-[11px] uppercase tracking-widest text-white">
        TARS // SECURE_TERMINAL
      </span>
      <!-- Fake window controls, purely decorative -->
      <div class="flex gap-1">
        <div class="w-3 h-3 beveled-outset"></div>
        <div class="w-3 h-3 beveled-outset"></div>
        <div class="w-3 h-3 beveled-outset"></div>
      </div>
    </header>

    <div class="p-6 space-y-5 bg-[#d1d5db]">

      <!-- Form heading -->
      <div class="border-b-2 border-[#4b5563] pb-3">
        <p class="text-[11px] font-black uppercase tracking-tight">TEMPORAL_ANOMALY_REPORTING_SYSTEM</p>
        <p class="text-[10px] text-primary/60 font-bold mt-0.5">RESTRICTED ACCESS // LEVEL 4 CLEARANCE</p>
      </div>

      <!-- Email field -->
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase tracking-widest block">IDENTITY_HASH</label>
        <div class="beveled-inset">
          <input
            [(ngModel)]="email"
            type="text"
            placeholder="agent@tars.gov"
            class="w-full bg-transparent px-2 py-1.5 text-xs font-mono text-primary focus:outline-none placeholder:text-primary/30"
          />
        </div>
      </div>

      <!-- Password field -->
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase tracking-widest block">ACCESS_KEY</label>
        <div class="beveled-inset">
          <input
            [(ngModel)]="password"
            type="password"
            class="w-full bg-transparent px-2 py-1.5 text-xs font-mono text-primary focus:outline-none"
          />
        </div>
      </div>

      <!-- Error message -->
      <!-- Error message -->
      @if (errorMessage()) {
        <div class="beveled-inset bg-red-100 px-2 py-1">
          <p class="text-red-800 text-[10px] font-bold font-mono">! ERROR: {{ errorMessage() }}</p>
        </div>
      }

      <!-- Submit -->
      <button (click)="onLogin()" class="button-90s-primary w-full justify-center py-2.5 text-[11px] tracking-widest">
        [INITIALIZE_LINK]
      </button>

    </div>
  </section>
</main>

<!-- Status bar -->
<footer class="fixed bottom-0 left-0 w-full h-10 flex items-center px-4 bg-[#d1d5db] border-t-2 border-white shadow-[0_-2px_0_#4b5563] text-[10px] font-bold uppercase text-primary gap-6">
  <span class="flex items-center gap-2">
    <span class="w-3 h-3 bg-green-500 border border-green-900"></span>
    SYSTEM: ONLINE
  </span>
  <span class="opacity-50">BUILD_94.08.12</span>
</footer>
