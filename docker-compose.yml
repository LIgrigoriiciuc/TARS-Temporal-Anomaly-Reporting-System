services:
  db:
    image: postgres:15
    container_name: tars-db
    restart: always
    environment:
      POSTGRES_USER: tars_user
      POSTGRES_PASSWORD: tars_password
      POSTGRES_DB: tars_database
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: tars-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: ./backend # CHANGED: Point to the backend folder where the Dockerfile is
    container_name: tars-app
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      # These variables override your application.properties settings
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tars_database
      SPRING_DATASOURCE_USERNAME: tars_user
      SPRING_DATASOURCE_PASSWORD: tars_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Good practice to show which profile is active in Docker
      SPRING_PROFILES_ACTIVE: docker