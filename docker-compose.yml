services:
  db:
    image: postgres:15 # Use PostgreSQL version 15
    container_name: tars-db # Custom name for the container
    restart: always # Automatically restart if it crashes
    environment:
      POSTGRES_USER: tars_user # Database username
      POSTGRES_PASSWORD: tars_password # Database password
      POSTGRES_DB: tars_database # Name of the initial database
    ports:
      - "5432:5432" # Map host port 5432 to container port 5432

  redis:
    image: redis:7-alpine # Use lightweight Redis 7 Alpine image
    container_name: tars-redis # Custom name for the container
    restart: always # Automatically restart if it crashes
    ports:
      - "6379:6379" # Map host port 6379 to container port 6379

